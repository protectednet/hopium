name: Code Reviews
on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  conditional_review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 500

      - name: Define Upstream Repository and Branch
        id: upstream_config
        run: |
          echo "upstream_repo_url=https://github.com/chromium/chromium.git" >> $GITHUB_OUTPUT
          echo "upstream_branch_name=main" >> $GITHUB_OUTPUT

      - name: Check Commit Origin Against Upstream
        id: commit_origin_check
        run: |
          UPSTREAM_REPO_URL="${{ steps.upstream_config.outputs.upstream_repo_url }}"
          UPSTREAM_BRANCH_NAME="${{ steps.upstream_config.outputs.upstream_branch_name }}"
          PR_BASE_COMMIT_SHA="${{ github.event.pull_request.base.sha }}"
          PR_HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          echo "--- Git Diagnostics ---"
          echo "Current fetch-depth for actions/checkout is 100 (as per your last message)."
          echo "Attempting to ensure specific PR base/head SHAs are locally available and potentially deepen their history slightly."
          
          # These fetches might be redundant if actions/checkout with fetch-depth:100 was sufficient for these specific SHAs,
          # but they act as a safeguard to ensure these critical SHAs are resolvable.
          # We fetch with a small depth to get some context around them if they are already known.
          git fetch origin --no-tags --depth=5 "$PR_BASE_COMMIT_SHA" || echo "Warning: Deepening fetch for PR_BASE_COMMIT_SHA ($PR_BASE_COMMIT_SHA) failed. This might happen if the SHA is already well-covered by the initial fetch-depth=100, or if the SHA is not found (which would be an issue)."
          git fetch origin --no-tags --depth=5 "$PR_HEAD_SHA" || echo "Warning: Deepening fetch for PR_HEAD_SHA ($PR_HEAD_SHA) failed."
          echo "-------------------------"

          echo "Upstream Repository URL: $UPSTREAM_REPO_URL"
          echo "Target Upstream Branch for Comparison: $UPSTREAM_BRANCH_NAME"
          echo "PR Base Commit SHA (from event.pull_request.base.sha): $PR_BASE_COMMIT_SHA"
          echo "PR Head SHA (from event.pull_request.head.sha): $PR_HEAD_SHA"

          echo "Verifying PR_BASE_COMMIT_SHA ($PR_BASE_COMMIT_SHA) is a valid commit..."
          # This SHA comes directly from GitHub's event payload.
          # If 'actions/checkout' (with the current fetch-depth: 100) managed to retrieve this commit and its context, this should pass.
          git rev-parse --verify "$PR_BASE_COMMIT_SHA^{commit}" || \
            (echo "Error: PR_BASE_COMMIT_SHA '$PR_BASE_COMMIT_SHA' (from event.pull_request.base.sha) could not be resolved to a commit.
            This means the commit specified as the PR's base by GitHub is NOT found or NOT resolvable in the local repository checkout with the current fetch-depth (100).
            You likely need to INCREASE 'fetch-depth' in the 'actions/checkout' step. Try a larger value (e.g., 200, 500), or use '0' for full history (which is most reliable but potentially slower)." && exit 1)
          
          echo "Verifying PR_HEAD_SHA ($PR_HEAD_SHA) is a valid commit..."
          git rev-parse --verify "$PR_HEAD_SHA^{commit}" || \
            (echo "Error: PR_HEAD_SHA '$PR_HEAD_SHA' could not be resolved to a commit." && exit 1)

          # Add upstream remote
          if ! git remote | grep -q '^upstream$'; then
            echo "Adding remote 'upstream' for $UPSTREAM_REPO_URL"
            git remote add upstream "$UPSTREAM_REPO_URL"
          else
            echo "Remote 'upstream' already exists. Setting URL."
            git remote set-url upstream "$UPSTREAM_REPO_URL"
          fi

          echo "Fetching from upstream remote (target branch: $UPSTREAM_BRANCH_NAME)..."
          # Fetch depth for the *actual* upstream (Chromium) can remain as is.
          git fetch upstream "$UPSTREAM_BRANCH_NAME" --no-tags --depth=1000 
          UPSTREAM_BRANCH_HEAD_REF="refs/remotes/upstream/$UPSTREAM_BRANCH_NAME"
          echo "Successfully fetched $UPSTREAM_BRANCH_HEAD_REF"

          # Determine the merge base using the specific base commit SHA
          echo "Determining merge base between PR_BASE_COMMIT_SHA ($PR_BASE_COMMIT_SHA) and PR_HEAD_SHA ($PR_HEAD_SHA)..."
          MERGE_BASE=$(git merge-base "$PR_BASE_COMMIT_SHA" "$PR_HEAD_SHA")
          if [ -z "$MERGE_BASE" ]; then
            echo "Error: Could not determine merge base between PR_BASE_COMMIT_SHA ($PR_BASE_COMMIT_SHA) and PR_HEAD_SHA ($PR_HEAD_SHA)."
            echo "This could indicate unrelated histories OR that the fetched history (current depth: 100 for checkout) is insufficient to connect these two commits."
            echo "Consider increasing 'fetch-depth' in 'actions/checkout'. For safety, requiring review."
            echo "require_review=true" >> $GITHUB_OUTPUT
            exit 0 # Exiting 0 to allow the workflow to proceed with 'require_review=true'
          fi
          echo "Merge Base for PR commits (between $PR_BASE_COMMIT_SHA and $PR_HEAD_SHA): $MERGE_BASE"
          
          # Get the list of commit SHAs introduced by this PR (commits from MERGE_BASE (exclusive) to PR_HEAD_SHA (inclusive))
          PR_COMMIT_SHAS=$(git log "$MERGE_BASE".."$PR_HEAD_SHA" --pretty=format:"%H" --no-merges)

          if [ -z "$PR_COMMIT_SHAS" ]; then
            echo "No new authored commits found in PR range ($MERGE_BASE..$PR_HEAD_SHA)."
            echo "PR might be an empty sync or just a merge from upstream. No local review required."
            echo "require_review=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Commit SHAs in PR to verify against upstream ($UPSTREAM_BRANCH_HEAD_REF):"
          echo "$PR_COMMIT_SHAS"

          ALL_COMMITS_ARE_UPSTREAM=true
          for commit_sha in $PR_COMMIT_SHAS; do
            echo "Verifying commit $commit_sha against $UPSTREAM_BRANCH_HEAD_REF..."
            if git merge-base --is-ancestor "$commit_sha" "$UPSTREAM_BRANCH_HEAD_REF"; then
              echo "Commit $commit_sha FOUND in $UPSTREAM_BRANCH_HEAD_REF."
            else
              echo "Commit $commit_sha NOT FOUND in $UPSTREAM_BRANCH_HEAD_REF. This PR contains local/modified changes."
              ALL_COMMITS_ARE_UPSTREAM=false
              break 
            fi
          done

          if [[ "$ALL_COMMITS_ARE_UPSTREAM" == "true" ]]; then
            echo "All commits in this PR appear to originate from the upstream branch ($UPSTREAM_BRANCH_NAME)."
            echo "require_review=false" >> $GITHUB_OUTPUT
          else
            echo "This PR contains commits not found on the upstream branch ($UPSTREAM_BRANCH_NAME). Internal review required."
            echo "require_review=true" >> $GITHUB_OUTPUT
          fi

      - name: Determine Review Requirement and Add Labels
        id: review_decision_and_labeling
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const requireReviewOutputFromCommitCheck = ${{ steps.commit_origin_check.outputs.require_review || 'false' }};
            const prRequiresReview = requireReviewOutputFromCommitCheck === 'true';

            const prNumber = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            let labelToAdd = '';
            let labelToRemove = '';

            console.log(`Output from commit_origin_check (require_review string): '${requireReviewOutputFromCommitCheck}'`);
            console.log(`Interpreted as prRequiresReview (boolean): ${prRequiresReview}`);

            if (prRequiresReview) {
              console.log("Decision: PR contains local/modified changes. Internal review required.");
              labelToAdd = 'review-required';
              labelToRemove = 'upstream-sync';
            } else {
              console.log("Decision: PR is purely upstream. No internal review required by this check.");
              labelToAdd = 'upstream-sync';
              labelToRemove = 'review-required';
            }

            core.setOutput('require_review', prRequiresReview.toString());

            if (labelToAdd) {
              try {
                await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: [labelToAdd] });
                console.log(`Successfully added label: ${labelToAdd}`);
              } catch (error) {
                core.setFailed(`Error adding label ${labelToAdd}: ${error.message}`); // Fail the step on error
                return; // Exit script
              }
            }

            if (labelToRemove) {
              try {
                const { data: existingLabels } = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number: prNumber });
                const labelExists = existingLabels.some(label => label.name === labelToRemove);

                if (labelExists) {
                  await github.rest.issues.removeLabel({ owner, repo, issue_number: prNumber, name: labelToRemove });
                  console.log(`Successfully removed label: ${labelToRemove}`);
                } else {
                  console.log(`Label ${labelToRemove} not found on PR, no need to remove.`);
                }
              } catch (error) {
                console.warn(`Warning removing label ${labelToRemove}: ${error.message}`); // Don't fail for removal issues
              }
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enforce Review
        id: enforce_review
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const reviewCompletedLabel = 'review-completed';
            const upstreamSyncLabel = 'upstream-sync';
            const reviewRequiredLabel = 'review-required';

            
            const reviewDecisionOutput = '${{ steps.review_decision_and_labeling.outputs.require_review }}';
            const needsReviewBasedOnCommits = reviewDecisionOutput === 'true';

            console.log(`Decision from labeling step (needsReviewBasedOnCommits): ${needsReviewBasedOnCommits}`);

            const { data: labelsOnIssue } = await github.rest.issues.listLabelsOnIssue({
              owner,
              repo,
              issue_number: prNumber,
            });

            const hasReviewCompletedLabel = labelsOnIssue.some(label => label.name === reviewCompletedLabel);
            const hasUpstreamSyncLabel = labelsOnIssue.some(label => label.name === upstreamSyncLabel);
            const hasReviewRequiredLabel = labelsOnIssue.some(label => label.name === reviewRequiredLabel);

            if (hasReviewCompletedLabel) {
              console.log(`Review confirmed: PR has the '${reviewCompletedLabel}' label. Workflow check passed.`);
              if (hasReviewRequiredLabel) {
                  try {
                      await github.rest.issues.removeLabel({ owner, repo, issue_number: prNumber, name: reviewRequiredLabel });
                      console.log(`Cleaned up '${reviewRequiredLabel}' label after review completion.`);
                  } catch (error) {
                      console.warn(`Could not remove '${reviewRequiredLabel}' label during cleanup: ${error.message}`);
                  }
              }
              return;
            }

            if (hasUpstreamSyncLabel && !needsReviewBasedOnCommits) {
              console.log(`PR is an upstream sync and does not require further review by this action (label '${upstreamSyncLabel}' present, commit check confirms no local changes). Workflow check passed.`);
              return;
            }

            if (needsReviewBasedOnCommits) {
              console.log(`Internal review is required (PR contains local/modified commits or commit check decided so) AND '${reviewCompletedLabel}' label is NOT present. Failing check.`);
              core.setFailed(`Review required: PR contains local/modified commits (or labeling step determined need for review) and lacks '${reviewCompletedLabel}' label.`);
              exit 1;
            }